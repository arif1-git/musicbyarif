<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arif 'music player</title>

  <!-- Bootstrap (CDN) and Font Awesome (kept similar to your original) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* Keep the same background color behavior as your original code:
       using Bootstrap's bg-warning class on body, but add small layout tweaks */
    html,body { height:100%; margin:0; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    body.bg-warning {
      /* preserve bootstrap warning look but slightly tighten contrast for readability */
      background-color: #ffc107; /* same as bg-warning */
      color: #111;
      min-height:100vh;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* visualization canvas (transparent-ish so original yellow shows through) */
    #vizCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      display:block;
    }

    /* header */
    .app-head {
      position: relative;
      z-index: 2;
      padding-top: 18px;
      padding-bottom: 6px;
      text-align: center;
    }
    .app-head h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      color: #1f2937; /* darker text to read on yellow */
      letter-spacing: .2px;
    }

    /* player card placed on top of canvas */
    .player-card {
      position: relative;
      z-index: 2;
      margin: 16px auto;
      border-radius: .75rem;
      background: #fff;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.12);
      max-width: 420px;
    }

    /* cover image */
    .cover-img {
      display:block;
      width: 100%;
      height: auto;
      border-radius: .5rem;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease;
      will-change: transform, box-shadow;
    }
    .cover-pulse {
      transform: scale(1.06);
      box-shadow: 0 20px 70px rgba(34, 197, 94, 0.12);
    }

    /* controls */
    .controls-row {
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:center;
      margin-top: 14px;
    }

    .controls-row .btn-plain {
      background: transparent;
      border: none;
      color: #111;
      font-size: 1.4rem;
      padding: 8px;
    }

    .play-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size: 1.15rem;
      background: linear-gradient(180deg,#ffb300,#ff8f00);
      color: #111;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
    }

    .meta-row { display:flex; justify-content:space-between; align-items:center; margin-top:12px; gap:10px; font-size: .95rem; color: #374151; }
    .meta-row .time { font-size:.85rem; color:#475569; }

    /* progress slider */
    .progress-range { width:100%; accent-color: #ff8f00; margin-top:10px; }

    /* small screens - mobile optimizations */
    @media (max-width:576px) {
      .player-card { padding: 14px; margin: 8px; max-width: 94%; }
      .play-btn { width: 58px; height: 58px; }
      .controls-row .btn-plain { font-size: 1.2rem; padding: 10px; }
      .app-head h1 { font-size: 1.05rem; }
    }

    /* focus a11y */
    button:focus, input:focus { outline: 3px solid rgba(0,0,0,0.08); outline-offset: 3px; border-radius:6px; }

  </style>
</head>
<body class="bg-warning">

  <!-- visualization canvas (transparent to preserve bg-warning) -->
  <canvas id="vizCanvas" aria-hidden="true"></canvas>

  <!-- header with same top heading you asked for -->
  <header class="app-head">
    <h1>Arif 'music player</h1>
  </header>

  <!-- main content (keeps same image and mobile responsive layout) -->
  <div class="container-fluid">
    <div class="row">
      <div class="col-12 d-flex justify-content-center">
        <div class="player-card">

          <!-- same image filename as your original -->
          <img id="cover" class="cover-img" src="music.png" alt="music cover (music.png)">

          <!-- audio element: keep initial src as in your original file -->
          <audio id="song" src="a.mp3" crossorigin="anonymous"></audio>

          <!-- controls -->
          <div class="controls-row">
            <button id="prevBtn" class="btn-plain" title="Previous" aria-label="Previous">
              <i class="fa-solid fa-backward"></i>
            </button>

            <button id="playBtn" class="play-btn" title="Play / Pause" aria-label="Play/Pause">
              <i id="playIcon" class="fa-solid fa-play"></i>
            </button>

            <button id="nextBtn" class="btn-plain" title="Next" aria-label="Next">
              <i class="fa-solid fa-forward"></i>
            </button>
          </div>

          <!-- progress and meta -->
          <input id="progress" class="progress-range" type="range" min="0" max="100" step="0.1" value="0" aria-label="Playback position">

          <div class="meta-row">
            <div id="trackLabel">a.mp3</div>
            <div id="timeLabel" class="time">00:00 / 00:00</div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- script: playlist + audio-reactive canvas + mobile-friendly behavior -->
  <script>
    (function () {
      // DOM references
      const song = document.getElementById('song');
      const playBtn = document.getElementById('playBtn');
      const playIcon = document.getElementById('playIcon');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const cover = document.getElementById('cover');
      const trackLabel = document.getElementById('trackLabel');
      const timeLabel = document.getElementById('timeLabel');
      const progress = document.getElementById('progress');
      const canvas = document.getElementById('vizCanvas');
      const ctx = canvas.getContext('2d');

      // playlist mirrors your original list
      const songs = ["b.mp3","c.mp3","a.mp3","d.mp3","e.mp3","f.mp3","g.mp3","h.mp3","i.mp3"];
      // original HTML had a.mp3 as initial src; keep i pointer consistent with your earlier logic:
      let i = 0; // next() will pick songs[i], initial audio already set to a.mp3

      // WebAudio analyser setup
      let audioCtx = null;
      let analyser = null;
      let dataArray = null;
      let bufferLength = 0;
      let sourceNode = null;
      let rafId = null;

      // visualization helpers
      let lastAvg = 0;
      let beatHold = 0;

      // resize canvas for DPR
      function resizeCanvas() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(window.innerWidth * dpr);
        canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // format time
      function fmt(t) {
        if (!t || isNaN(t)) return '00:00';
        const mm = Math.floor(t / 60).toString().padStart(2, '0');
        const ss = Math.floor(t % 60).toString().padStart(2, '0');
        return mm + ':' + ss;
      }

      // create audio context + analyser when user interacts
      function ensureAudioCtx() {
        if (audioCtx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);
        try {
          sourceNode = audioCtx.createMediaElementSource(song);
          sourceNode.connect(analyser);
          analyser.connect(audioCtx.destination);
        } catch (err) {
          // some browsers block multiple source nodes or cross-origin
          console.warn('Could not create media source for analyser:', err);
        }
      }

      // play/pause toggle
      async function playpause() {
        try {
          if (song.paused) {
            ensureAudioCtx();
            if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
            await song.play();
          } else {
            song.pause();
          }
        } catch (err) {
          console.error('Playback error:', err);
        }
      }

      // next (follows original ne() style)
      function nextSong() {
        // pick next from songs[] using index i (like your original behaviour)
        song.src = songs[i];
        i++;
        if (i >= songs.length) i = 0;
        song.play().catch(()=>{ /* play may be blocked until user gesture */ });
        trackLabel.textContent = song.src.split('/').pop();
      }

      // previous track (new convenience)
      function prevSong() {
        // go back one in the array; ensure wrap-around
        i = (i - 1 + songs.length) % songs.length;
        song.src = songs[i];
        i = (i + 1) % songs.length; // keep i as "next" index to match nextSong()
        song.play().catch(()=>{});
        trackLabel.textContent = song.src.split('/').pop();
      }

      // sync play/pause icon
      function syncIcon() {
        if (song.paused) {
          playIcon.className = 'fa-solid fa-play';
        } else {
          playIcon.className = 'fa-solid fa-pause';
        }
      }

      // update time & progress
      function updateTime() {
        timeLabel.textContent = fmt(song.currentTime) + ' / ' + (song.duration ? fmt(song.duration) : '00:00');
        if (!isNaN(song.duration) && song.duration > 0) {
          progress.value = (song.currentTime / song.duration) * 100;
        }
      }

      progress.addEventListener('input', () => {
        if (!isNaN(song.duration) && song.duration > 0) {
          song.currentTime = (progress.value / 100) * song.duration;
        }
      });

      // event listeners for controls
      playBtn.addEventListener('click', playpause);
      nextBtn.addEventListener('click', nextSong);
      prevBtn.addEventListener('click', prevSong);

      // audio element events
      song.addEventListener('play', () => {
        syncIcon();
        ensureAudioCtx();
        cancelAnimationFrame(rafId);
        draw();
      });
      song.addEventListener('pause', () => {
        syncIcon();
        cancelAnimationFrame(rafId);
      });
      song.addEventListener('timeupdate', updateTime);
      song.addEventListener('loadedmetadata', updateTime);
      song.addEventListener('ended', nextSong);

      // visualization draw loop
      function draw() {
        rafId = requestAnimationFrame(draw);
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);

        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        ctx.clearRect(0, 0, w, h);

        // compute average energy and bass energy
        let sum = 0, bassSum = 0;
        const bassBins = Math.max(3, Math.floor(bufferLength * 0.05));
        for (let j = 0; j < bufferLength; j++) {
          sum += dataArray[j];
          if (j < bassBins) bassSum += dataArray[j];
        }
        const avg = sum / bufferLength;
        const bassAvg = bassSum / bassBins;

        // background radial glow (semi-transparent so yellow bg shows through)
        const hue = 30 + Math.round((avg / 255) * 40); // warm hue near orange
        const alpha = Math.min(0.7, 0.06 + (avg / 255) * 0.6);
        const grad = ctx.createRadialGradient(w * 0.5, h * 0.35, 0, w * 0.5, h * 0.35, Math.max(w, h));
        grad.addColorStop(0, `hsla(${hue}, 95%, 55%, ${alpha})`);
        grad.addColorStop(0.55, `hsla(${(hue + 30) % 360},90%,48%, ${alpha * 0.25})`);
        grad.addColorStop(1, 'rgba(255,255,255,0)'); // let the yellow base show
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        // radial bars
        const bars = Math.min(110, Math.floor(w / 6));
        const cx = w / 2, cy = h / 2;
        const baseR = Math.min(w, h) * 0.08;
        const maxR = Math.min(w, h) * 0.45;

        for (let b = 0; b < bars; b++) {
          const idx = Math.floor(b * (bufferLength / bars));
          const v = dataArray[idx] / 255; // 0..1
          const angle = (b / bars) * Math.PI * 2;
          const radius = baseR + v * maxR;
          const x1 = cx + Math.cos(angle) * (baseR * 0.66);
          const y1 = cy + Math.sin(angle) * (baseR * 0.66);
          const x2 = cx + Math.cos(angle) * radius;
          const y2 = cy + Math.sin(angle) * radius;

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          const barHue = (10 + b * 2) % 360; // warm-to-slightly-cool range
          ctx.strokeStyle = `hsla(${barHue}, 85%, ${38 + v * 18}%, ${0.92})`;
          ctx.lineWidth = 1 + v * 4;
          ctx.stroke();
        }

        // center glow
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseR * 3);
        g.addColorStop(0, `hsla(${hue}, 90%, 60%, ${Math.min(0.9, 0.12 + bassAvg / 255)})`);
        g.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, baseR * 2.2, 0, Math.PI * 2);
        ctx.fill();

        // simple beat detection
        if (avg > lastAvg * 1.5 && avg > 70 && beatHold <= 0) {
          // trigger small visual pulse on the cover
          cover.classList.add('cover-pulse');
          setTimeout(() => cover.classList.remove('cover-pulse'), 160);
          beatHold = 8;
        } else {
          beatHold = Math.max(0, beatHold - 1);
        }
        lastAvg = lastAvg * 0.85 + avg * 0.15;
      }

      // Allow mobile to resume audio context on first user gesture
      document.addEventListener('click', function once() {
        try { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch (e) {}
        document.removeEventListener('click', once);
      }, { once: true });

      // Initialize UI
      trackLabel.textContent = song.src.split('/').pop();
      syncIcon();

    })();
  </script>

  <!-- Bootstrap JS (if you prefer local, replace with your js/bootstrap.bundle.js) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
